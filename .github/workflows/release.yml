name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o "sftpsyncd-${GOOS}-${GOARCH}" ./cmd/sftpsyncd
          go build -ldflags="-s -w" -o "sftpsync-${GOOS}-${GOARCH}"  ./cmd/sftpsync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sftpsyncd-*
            sftpsync-*

  build-bar:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build sftpsyncbar (arm64)
        run: |
          go build -ldflags="-s -w" -o sftpsyncbar-bin ./cmd/sftpsyncbar

      - name: Package .app bundle
        run: |
          mkdir -p sftpsyncbar.app/Contents/MacOS
          mv sftpsyncbar-bin sftpsyncbar.app/Contents/MacOS/sftpsyncbar
          cp cmd/sftpsyncbar/Info.plist sftpsyncbar.app/Contents/Info.plist
          zip -r sftpsyncbar-darwin-arm64.zip sftpsyncbar.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-sync-bar-darwin
          path: sftpsyncbar-darwin-*.zip

  release:
    needs: [build, build-bar]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sftpsyncd-*
            sftpsync-*
            sftpsyncbar-*.zip
