name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o "sftpsyncd-${GOOS}-${GOARCH}${ext}" ./cmd/sftpsyncd
          go build -ldflags="-s -w" -o "sftpsync-${GOOS}-${GOARCH}${ext}"  ./cmd/sftpsync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sftpsyncd-*
            sftpsync-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sftpsyncd-*
            sftpsync-*
