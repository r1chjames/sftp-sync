name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o "sftpsyncd-${GOOS}-${GOARCH}" ./cmd/sftpsyncd
          go build -ldflags="-s -w" -o "sftpsync-${GOOS}-${GOARCH}"  ./cmd/sftpsync

      - name: Build sftpsyncbar and package .app bundle (macOS only)
        if: matrix.goos == 'darwin'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o sftpsyncbar-bin ./cmd/sftpsyncbar
          mkdir -p sftpsyncbar.app/Contents/MacOS
          mv sftpsyncbar-bin sftpsyncbar.app/Contents/MacOS/sftpsyncbar
          cat > sftpsyncbar.app/Contents/Info.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>sftpsyncbar</string>
              <key>CFBundleDisplayName</key>
              <string>sftpsyncbar</string>
              <key>CFBundleExecutable</key>
              <string>sftpsyncbar</string>
              <key>CFBundleIdentifier</key>
              <string>com.r1chjames.sftpsyncbar</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF
          zip -r "sftpsyncbar-darwin-${GOARCH}.zip" sftpsyncbar.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sftp-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sftpsyncd-*
            sftpsync-*
            sftpsyncbar-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sftpsyncd-*
            sftpsync-*
            sftpsyncbar-*.zip
